<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFID Manager — MQTT Dashboard</title>
<style>
  :root {
    --bg-primary: #0f0f11;
    --bg-secondary: #1a1a1e;
    --bg-card: #222226;
    --bg-card-hover: #2a2a2e;
    --border: #333338;
    --text-primary: #e8e8ea;
    --text-secondary: #88889a;
    --text-muted: #555560;
    --accent: #00FF88;
    --accent-dim: rgba(0, 255, 136, 0.15);
    --accent-glow: rgba(0, 255, 136, 0.08);
    --error: #ff4444;
    --warning: #ffaa44;
    --radius: 8px;
    --radius-sm: 4px;
    --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header h1 span {
    color: var(--text-secondary);
    font-weight: 400;
  }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
    transition: background 0.3s;
  }

  .status-dot.connected {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 16px 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.2s;
  }

  .stat-card:hover {
    border-color: var(--accent-dim);
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--text-primary);
    line-height: 1.1;
  }

  .stat-value.accent {
    color: var(--accent);
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 0;
    height: calc(100vh - 180px);
    padding: 0 24px 24px;
  }

  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      height: auto;
    }
  }

  /* Live feed */
  .feed-panel {
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
  }

  .feed-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .feed-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  .feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .feed-list:empty::after {
    content: 'Väntar på inkommande MQTT-meddelanden...';
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
  }

  /* Message card */
  .msg-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateX(-12px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .msg-card:hover {
    border-color: var(--accent-dim);
    background: var(--bg-card-hover);
  }

  .msg-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }

  .msg-uid {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .msg-type-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-dim);
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .msg-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .msg-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .msg-preview {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* Expanded detail */
  .msg-detail {
    display: none;
    margin-top: 8px;
    padding: 12px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .msg-card.expanded .msg-detail {
    display: block;
  }

  .msg-detail pre {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .msg-detail .field {
    display: flex;
    gap: 8px;
    padding: 2px 0;
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .msg-detail .field-key {
    color: var(--accent);
    min-width: 100px;
    flex-shrink: 0;
  }

  .msg-detail .field-value {
    color: var(--text-primary);
    word-break: break-all;
  }

  .msg-detail .field-value.string { color: #e6db74; }
  .msg-detail .field-value.number { color: #ae81ff; }
  .msg-detail .field-value.boolean { color: #66d9ef; }
  .msg-detail .field-value.null { color: var(--text-muted); font-style: italic; }

  /* Detail panel (empty state) */
  .detail-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .detail-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    padding: 24px;
    text-align: center;
  }

  .detail-empty-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .detail-empty-text {
    font-size: 14px;
    line-height: 1.5;
  }

  .detail-empty-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .detail-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .detail-content pre {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .detail-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section-title:first-child {
    margin-top: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <h1>RFID Manager <span>— MQTT Dashboard</span></h1>
  </div>
  <div class="connection-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ansluter...</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Meddelanden</div>
    <div class="stat-value accent" id="statTotal">—</div>
    <div class="stat-sub" id="statPerMin">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Unika UID:n</div>
    <div class="stat-value" id="statUids">—</div>
    <div class="stat-sub">identifierade taggar</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Senaste</div>
    <div class="stat-value" id="statLast">—</div>
    <div class="stat-sub" id="statLastTime">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Driftid</div>
    <div class="stat-value" id="statUptime">0:00</div>
    <div class="stat-sub">dashboard igång</div>
  </div>
</div>

<div class="main">
  <div class="feed-panel">
    <div class="feed-header">
      <span>Live-flöde</span>
      <span class="feed-count" id="feedCount">0 meddelanden</span>
    </div>
    <div class="feed-list" id="feedList"></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">Detaljvy</div>
    <div class="detail-empty" id="detailEmpty">
      <div class="detail-empty-icon">◈</div>
      <div class="detail-empty-text">Klicka på ett meddelande<br>i live-flödet för detaljer</div>
      <div class="detail-empty-sub">inklusive full JSON och tolkade fält</div>
    </div>
    <div class="detail-content" id="detailContent" style="display:none"></div>
  </div>
</div>

<script>
const eventSources = [];
let messages = [];
let selectedId = null;
let startTime = Date.now();
let msgCountInMinute = 0;
let minuteTimer = null;

const $ = id => document.getElementById(id);

function connectSSE() {
  const es = new EventSource('/api/events');

  es.onmessage = (event) => {
    if (event.data && event.data.startsWith(':')) return;
    try {
      const msg = JSON.parse(event.data);
      handleNewMessage(msg);
    } catch (e) {
      // keepalive
    }
  };

  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 3000);
  };

  eventSources.push(es);
}

function handleNewMessage(msg) {
  messages.unshift(msg);
  if (messages.length > 200) messages.pop();

  msgCountInMinute++;

  // Update latest stat directly from SSE data (instant, no round-trip)
  $('statLast').textContent = msg.uid;
  $('statLastTime').textContent = formatTime(msg.timestamp);

  renderFeed();
  updateStats();
  updateConnectionStatus(true);
}

function renderFeed() {
  const list = $('feedList');
  const selectedMsg = messages.find(m => m.id === selectedId);

  list.innerHTML = messages.slice(0, 50).map(m => {
    const isSelected = m.id === selectedId;
    const time = formatTime(m.timestamp);
    const preview = m.source
      ? truncate(m.source, 60)
      : (m.data && m.data.payload
        ? 'data: ' + m.data.payload
        : JSON.stringify(m.raw).substring(0, 60));

    return `
      <div class="msg-card ${isSelected ? 'expanded' : ''}"
           onclick="selectMessage('${m.id}')"
           data-id="${m.id}">
        <div class="msg-card-header">
          <div class="msg-uid">${esc(m.uid)}</div>
          <div class="msg-type-badge">${esc(m.type)}</div>
        </div>
        <div class="msg-meta">
          <span>◷ ${time}</span>
          <span>📡 ${esc(m.topic)}</span>
          ${m.sparkplug ? '<span style="color:var(--accent)">⚡ Sparkplug</span>' : ''}
        </div>
        <div class="msg-preview">${esc(preview)}</div>
        ${isSelected ? renderDetail(m) : ''}
      </div>
    `;
  }).join('');

  $('feedCount').textContent = `${messages.length} meddelanden`;
}

function renderDetail(m) {
  const time = new Date(m.timestamp);
  const timeStr = time.toLocaleString('sv-SE');

  const dataFields = m.data && Object.keys(m.data).length > 0
    ? Object.entries(m.data).map(([k, v]) =>
        `<div class="field"><span class="field-key">${k}</span><span class="field-value ${typeof v}">${esc(String(v))}</span></div>`
      ).join('')
    : '<div class="field"><span class="field-value null">Ingen data</span></div>';

  const rawFormatted = JSON.stringify(m.raw, null, 2);

  return `
    <div class="msg-detail">
      <div class="detail-section-title">Tolkade fält</div>
      <div class="field"><span class="field-key">uid</span><span class="field-value string">${esc(m.uid)}</span></div>
      <div class="field"><span class="field-key">type</span><span class="field-value string">${esc(m.type)}</span></div>
      <div class="field"><span class="field-key">timestamp</span><span class="field-value number">${timeStr}</span></div>
      <div class="field"><span class="field-key">topic</span><span class="field-value string">${esc(m.topic)}</span></div>
      <div class="field"><span class="field-key">source</span><span class="field-value string">${esc(m.source || '—')}</span></div>
      <div class="field"><span class="field-key">sparkplug</span><span class="field-value boolean">${m.sparkplug}</span></div>
      <div class="field"><span class="field-key">received</span><span class="field-value string">${m.received_at}</span></div>

      <div class="detail-section-title">Data</div>
      ${dataFields}

      <div class="detail-section-title">Rå JSON</div>
      <pre>${esc(rawFormatted)}</pre>
    </div>
  `;
}

function selectMessage(id) {
  selectedId = selectedId === id ? null : id;
  renderFeed();

  if (selectedId) {
    $('detailEmpty').style.display = 'none';
    $('detailContent').style.display = 'block';
    const msg = messages.find(m => m.id === selectedId);
    if (msg) {
      $('detailContent').innerHTML = renderDetailFromMsg(msg);
    }
  } else {
    $('detailEmpty').style.display = 'flex';
    $('detailContent').style.display = 'none';
  }
}

function renderDetailFromMsg(m) {
  const dataFields = m.data && Object.keys(m.data).length > 0
    ? Object.entries(m.data).map(([k, v]) =>
        `<div class="field"><span class="field-key">${k}</span><span class="field-value ${typeof v}">${esc(String(v))}</span></div>`
      ).join('')
    : '<div class="field"><span class="field-value null">Ingen data</span></div>';

  const rawFormatted = JSON.stringify(m.raw, null, 2);

  return `
    <div class="detail-section-title">Meddelande</div>
    <div class="field"><span class="field-key">UID</span><span class="field-value string">${esc(m.uid)}</span></div>
    <div class="field"><span class="field-key">Typ</span><span class="field-value string">${esc(m.type)}</span></div>
    <div class="field"><span class="field-key">Topic</span><span class="field-value string">${esc(m.topic)}</span></div>
    <div class="field"><span class="field-key">Tid</span><span class="field-value number">${formatTime(m.timestamp)}</span></div>
    <div class="field"><span class="field-key">Källa</span><span class="field-value string">${esc(m.source || '—')}</span></div>
    <div class="field"><span class="field-key">Mottaget</span><span class="field-value string">${m.received_at}</span></div>

    <div class="detail-section-title">Data</div>
    ${dataFields}

    <div class="detail-section-title">Rå JSON</div>
    <pre>${esc(rawFormatted)}</pre>
  `;
}

function updateStats() {
  fetch('/api/stats')
    .then(r => r.json())
    .then(stats => {
      $('statTotal').textContent = stats.total ?? 0;
      $('statUids').textContent = stats.unique_uids ?? 0;
      $('statPerMin').textContent = (stats.per_minute ?? 0) + '/min';

      if (messages.length > 0) {
        const last = messages[0];
        $('statLast').textContent = last.uid;
        $('statLastTime').textContent = formatTime(last.timestamp);
      }

      if (stats.uptime != null) {
        const mins = Math.floor(stats.uptime / 60);
        const secs = Math.floor(stats.uptime % 60);
        $('statUptime').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      }

      updateConnectionStatus(stats.connected);
    })
    .catch(err => console.warn('Stats fetch failed:', err));
}

function updateConnectionStatus(connected) {
  const dot = $('statusDot');
  const text = $('statusText');
  if (connected) {
    dot.classList.add('connected');
    text.textContent = 'Ansluten till broker';
  } else {
    dot.classList.remove('connected');
    text.textContent = 'Ej ansluten';
  }
}

function pollStats() {
  updateStats();
  setTimeout(pollStats, 5000);
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(Number(ts));
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.substring(0, max) + '…' : s;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Per-minute counter
setInterval(() => {
  msgCountInMinute = 0;
}, 60000);

// Start
connectSSE();
pollStats();
</script>
</body>
</html>
